<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sign In | Lwazi Academy</title>
    <meta name="description" content="Sign in to your Lwazi Academy account to access your dashboard, sessions, and tutor connections."/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="/css/shared.css" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "outline-variant":"#c4c6cf","tertiary":"#735c00","surface-container-low":"#f4f3f7",
                        "on-tertiary":"#ffffff","tertiary-container":"#cca830","outline":"#74777f",
                        "on-primary":"#ffffff","surface-container-high":"#e9e7eb","primary-container":"#002147",
                        "error":"#ba1a1a","on-surface-variant":"#44474e","on-surface":"#1a1b1e",
                        "primary":"#000a1e","surface":"#faf9fd","surface-container":"#efedf1",
                        "error-container":"#ffdad6","tertiary-fixed-dim":"#e9c349","on-primary-container":"#708ab5"
                    },
                    fontFamily: { headline: ["Newsreader"], body: ["Manrope"], label: ["Manrope"] }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Manrope', sans-serif; }
        h1, h2, h3 { font-family: 'Newsreader', serif; }
    </style>
</head>
<body class="bg-surface text-on-surface">
    <!-- Header -->
    <header class="bg-surface sticky top-0 z-50 border-b border-outline-variant/10">
        <div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
            <a href="/" class="flex items-center gap-3 no-underline">
                <span class="material-symbols-outlined text-primary-container">school</span>
                <span class="text-2xl font-semibold text-primary-container font-headline tracking-tight">Lwazi Academy</span>
            </a>
            <nav class="flex items-center gap-6">
                <a href="/register.html" class="font-body font-medium text-on-surface-variant hover:text-primary-container transition-colors text-sm no-underline">Don't have an account? <span class="font-bold text-primary-container">Register</span></a>
            </nav>
        </div>
    </header>
    <div class="h-1 w-full bg-gradient-to-r from-tertiary-fixed-dim via-tertiary-container to-tertiary-fixed-dim"></div>

    <main class="page-container flex items-center justify-center min-h-[80vh]">
        <div class="w-full max-w-md mx-auto px-6 py-16">
            <!-- Heading -->
            <div class="text-center mb-10">
                <span class="material-symbols-outlined text-5xl text-tertiary-container mb-4">lock_open</span>
                <h1 class="text-4xl font-headline text-primary-container mb-3">Welcome Back</h1>
                <p class="text-on-surface-variant font-body">Sign in to continue your academic journey.</p>
            </div>

            <!-- Alert Container -->
            <div id="alert-container"></div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="lwazi-label" for="email">Email Address</label>
                    <input class="lwazi-input" type="email" id="email" name="email" placeholder="your@email.com" required/>
                </div>

                <div>
                    <label class="lwazi-label" for="password">Password</label>
                    <input class="lwazi-input" type="password" id="password" name="password" placeholder="Enter your password" required/>
                </div>

                <button type="submit" class="lwazi-btn-primary w-full" id="submit-btn">
                    <span class="material-symbols-outlined text-lg">login</span>
                    Sign In
                </button>
            </form>

            <!-- Demo Accounts -->
            <div class="mt-10 p-6 bg-surface-container-low border border-outline-variant/30">
                <p class="font-label font-bold text-xs uppercase tracking-widest text-on-surface-variant mb-4 flex items-center gap-2">
                    <span class="material-symbols-outlined text-base">science</span>
                    Demo Accounts
                </p>
                <div class="space-y-3">
                    <button class="w-full text-left px-4 py-3 bg-surface hover:bg-surface-container-high border border-outline-variant/30 transition-colors group" onclick="fillDemo('student@lwazi.co.za')">
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="font-body font-bold text-sm text-primary-container">Demo Student</span>
                                <span class="text-on-surface-variant text-xs ml-2">student@lwazi.co.za</span>
                            </div>
                            <span class="material-symbols-outlined text-outline group-hover:text-primary-container transition-colors text-base">arrow_forward</span>
                        </div>
                    </button>
                    <button class="w-full text-left px-4 py-3 bg-surface hover:bg-surface-container-high border border-outline-variant/30 transition-colors group" onclick="fillDemo('thabo.mokoena@lwazi.co.za')">
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="font-body font-bold text-sm text-primary-container">Demo Tutor</span>
                                <span class="text-on-surface-variant text-xs ml-2">thabo.mokoena@lwazi.co.za</span>
                            </div>
                            <span class="material-symbols-outlined text-outline group-hover:text-primary-container transition-colors text-base">arrow_forward</span>
                        </div>
                    </button>
                </div>
                <p class="text-on-surface-variant text-xs mt-3">Password for all demo accounts: <code class="bg-surface-container-high px-2 py-0.5">password123</code></p>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        // Redirect if already logged in
        if (LwaziAPI.isLoggedIn()) {
            window.location.href = '/dashboard.html';
        }

        function fillDemo(email) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = 'password123';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertContainer = document.getElementById('alert-container');
            const submitBtn = document.getElementById('submit-btn');
            alertContainer.innerHTML = '';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="lwazi-spinner mx-auto" style="width:20px;height:20px;border-width:2px"></div>';

            try {
                await LwaziAPI.login(email, password);
                showAlert(alertContainer, 'Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 800);
            } catch (err) {
                showAlert(alertContainer, err.message, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span class="material-symbols-outlined text-lg">login</span> Sign In';
            }
        });
    </script>
</body>
</html>
